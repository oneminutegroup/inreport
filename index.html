<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출근보고</title>

<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; width: 100%; overflow-x: hidden; }

body {
  font-family: Arial;
  background: #f5f6fa;
  padding: 10px;
}

.container {
  width: 100%;
  background: white;
  padding: 16px;
  border-radius: 14px;
}

h2 { margin: 0 0 20px; }

label.main {
  font-weight: bold;
  display: block;
  margin-bottom: 8px;
}

select, textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 20px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.section { margin-bottom: 25px; }

.section-title {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 10px;
}

.room-line {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}

.room-type {
  min-width: 80px;
  font-weight: bold;
}

.room-options {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.room-options label {
  display: flex;
  align-items: center;
  gap: 4px;
}

button {
  width: 100%;
  padding: 15px;
  background: black;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}
</style>
</head>

<body>
<div class="container">

<h2>출근보고</h2>

<label class="main">근로자</label>
<select id="worker">
  <option value="">선택하세요</option>
  <option>직원1</option>
  <option>직원2</option>
</select>

<div class="section">
  <div class="section-title">청소객실 (<span id="cleanCount">0</span>)</div>
  <div id="clean"></div>
</div>

<div class="section">
  <div class="section-title">점검객실 (<span id="inspectCount">0</span>)</div>
  <div id="inspect"></div>
</div>

<div class="section">
  <div class="section-title">전날노쇼</div>

  <select id="noshowSelect" onchange="toggleNoshow()">
    <option value="없음" selected>없음</option>
    <option value="있음">있음</option>
  </select>

  <div id="noshowBox" style="display:none;">
    <div id="noshow"></div>
  </div>
</div>

<label class="main">특이사항</label>
<textarea id="memo"></textarea>

<button onclick="submitForm()">제출</button>

</div>

<script>
const webhook = "https://hook.us2.make.com/2y9kz1fqhfr2hl84og54aft1lcligjl5";

const rooms = {
  "미니싱글": ["401","408","501","508"],
  "싱글": ["402","407","502","504"],
  "더블": ["403","404","405","503","505"],
  "패밀리": ["406","506"]
};

function createSection(id){
  const container = document.getElementById(id);

  for (let type in rooms){
    let line = document.createElement("div");
    line.className = "room-line";

    let t = document.createElement("div");
    t.className = "room-type";
    t.innerText = type;

    let opt = document.createElement("div");
    opt.className = "room-options";

    rooms[type].forEach(r=>{
      let label = document.createElement("label");

      let cb = document.createElement("input");
      cb.type = "checkbox";
      cb.value = r;
      cb.name = id;
      cb.onchange = updateCount;

      label.appendChild(cb);
      label.append(" "+r);
      opt.appendChild(label);
    });

    line.appendChild(t);
    line.appendChild(opt);
    container.appendChild(line);
  }
}

createSection("clean");
createSection("inspect");
createSection("noshow");

function getChecked(name){
  return [...document.querySelectorAll(`input[name=${name}]:checked`)].map(e=>e.value);
}

function updateCount(){
  document.getElementById("cleanCount").innerText = getChecked("clean").length;
  document.getElementById("inspectCount").innerText = getChecked("inspect").length;
}

function toggleNoshow(){
  const val = document.getElementById("noshowSelect").value;
  const box = document.getElementById("noshowBox");

  if(val === "있음"){
    box.style.display = "block";
  } else {
    box.style.display = "none";
    document.querySelectorAll('input[name=noshow]').forEach(cb=>cb.checked=false);
  }
}

function submitForm(){

  const worker = document.getElementById("worker").value;
  const clean = getChecked("clean");
  const inspect = getChecked("inspect");
  const noshowMode = document.getElementById("noshowSelect").value;
  const noshowRooms = getChecked("noshow");
  const memo = document.getElementById("memo").value;

  const noshowText = noshowMode === "없음" ? "없음" : (noshowRooms.join(", ") || "없음");

  const text =
`[출근보고]
근로자: ${worker}

청소객실: ${clean.length}개
${clean.join(", ") || "없음"}

점검객실: ${inspect.length}개
${inspect.join(", ") || "없음"}

전날노쇼: ${noshowText}

특이사항: ${memo || "없음"}`;

  fetch(webhook,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({text})
  });

  alert("전송완료");
}
</script>

</body>
</html>
