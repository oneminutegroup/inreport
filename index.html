<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출근보고</title>

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  overflow-x: hidden;
}

body {
  font-family: Arial, sans-serif;
  background: #f5f6fa;
  padding: 10px;
}

.container {
  width: 100%;
  max-width: 100%;
  margin: 0;
  background: white;
  padding: 16px;
  border-radius: 14px;
}

h2 {
  margin: 0 0 20px 0;
  font-size: 22px;
}

label.main-label {
  display: block;
  font-weight: bold;
  margin-bottom: 8px;
}

select, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  margin-bottom: 20px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 16px;
  box-sizing: border-box;
  background: white;
}

.section {
  margin-bottom: 26px;
}

.section-title {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 12px;
}

.room-line {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
  width: 100%;
}

.room-type {
  min-width: 86px;
  font-weight: bold;
  line-height: 1.2;
  display: flex;
  align-items: center;
}

.room-options {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px 14px;
  flex: 1;
}

.room-options label {
  font-weight: normal;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
  line-height: 1.2;
  margin: 0;
  vertical-align: middle;
}

.room-options input[type="checkbox"] {
  margin: 0;
  vertical-align: middle;
  position: relative;
  top: 0;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  background: black;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

@media (min-width: 768px) {
  body {
    padding: 16px;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
  }
}

@media (max-width: 600px) {
  body {
    padding: 0;
  }

  .container {
    border-radius: 0;
    padding: 14px;
  }

  .room-line {
    gap: 8px;
  }

  .room-type {
    min-width: 78px;
    font-size: 15px;
  }

  .room-options {
    gap: 8px 10px;
  }

  .room-options label {
    font-size: 15px;
  }

  h2 {
    font-size: 20px;
  }

  .section-title {
    font-size: 17px;
  }
}
</style>
</head>

<body>
<div class="container">

  <h2>출근보고</h2>

  <label class="main-label" for="worker">근로자</label>
  <select id="worker">
    <option value="">선택하세요</option>
    <option>직원1</option>
    <option>직원2</option>
    <option>직원3</option>
  </select>

  <div class="section">
    <div class="section-title">청소객실 (<span id="cleanCount">0</span>개)</div>
    <div id="clean"></div>
  </div>

  <div class="section">
    <div class="section-title">점검객실 (<span id="inspectCount">0</span>개)</div>
    <div id="inspect"></div>
  </div>

  <div class="section">
    <div class="section-title">전날노쇼 (<span id="noshowCount">0</span>개)</div>
    <div id="noshow"></div>
  </div>

  <label class="main-label" for="memo">특이사항</label>
  <textarea id="memo" rows="4"></textarea>

  <button onclick="submitForm()">제출</button>

</div>

<script>
const webhookUrl = "https://hook.us2.make.com/2y9kz1fqhfr2hl84og54aft1lcligjl5";

const rooms = {
  "미니싱글": ["401","408","501","508"],
  "싱글": ["402","407","502","504"],
  "더블": ["403","404","405","503","505"],
  "패밀리": ["406","506"]
};

function createSection(id) {
  const container = document.getElementById(id);

  for (let type in rooms) {
    const line = document.createElement("div");
    line.className = "room-line";

    const typeDiv = document.createElement("div");
    typeDiv.className = "room-type";
    typeDiv.textContent = type;

    const optionsDiv = document.createElement("div");
    optionsDiv.className = "room-options";

    rooms[type].forEach(room => {
      const label = document.createElement("label");

      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.value = room;
      cb.name = id;
      cb.onchange = updateCount;

      label.appendChild(cb);
      label.append(" " + room);
      optionsDiv.appendChild(label);
    });

    line.appendChild(typeDiv);
    line.appendChild(optionsDiv);
    container.appendChild(line);
  }
}

createSection("clean");
createSection("inspect");
createSection("noshow");

function getChecked(name) {
  return [...document.querySelectorAll(`input[name="${name}"]:checked`)].map(e => e.value);
}

function updateCount() {
  document.getElementById("cleanCount").innerText = getChecked("clean").length;
  document.getElementById("inspectCount").innerText = getChecked("inspect").length;
  document.getElementById("noshowCount").innerText = getChecked("noshow").length;
}

async function submitForm() {
  const worker = document.getElementById("worker").value;
  const clean = getChecked("clean");
  const inspect = getChecked("inspect");
  const noshow = getChecked("noshow");
  const memo = document.getElementById("memo").value.trim();

  if (!worker) {
    alert("근로자를 선택하세요.");
    return;
  }

  const text =
`[출근보고]
근로자: ${worker}

청소객실: ${clean.length}개
${clean.join(", ") || "없음"}

점검객실: ${inspect.length}개
${inspect.join(", ") || "없음"}

전날노쇼: ${noshow.join(", ") || "없음"}

특이사항: ${memo || "없음"}`;

  try {
    const response = await fetch(webhookUrl, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        worker: worker,
        cleanRooms: clean,
        cleanCount: clean.length,
        inspectRooms: inspect,
        inspectCount: inspect.length,
        noshowRooms: noshow,
        noshowText: noshow.join(", ") || "없음",
        memo: memo || "없음",
        text: text,
        submittedAt: new Date().toISOString()
      })
    });

    if (!response.ok) {
      throw new Error("Webhook 전송 실패");
    }

    alert("전송완료");

    document.getElementById("worker").value = "";
    document.getElementById("memo").value = "";
    document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
    updateCount();

  } catch (error) {
    alert("전송 실패");
    console.error(error);
  }
}
</script>
</body>
</html>
